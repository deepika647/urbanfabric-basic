version: '3.9'

services:
  redis:
    image: redis:7
    restart: unless-stopped

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/outputs:/app/outputs
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A tasks worker --loglevel=warning
    volumes:
      - ./backend/outputs:/app/outputs
    depends_on:
      - redis
    restart: unless-stopped